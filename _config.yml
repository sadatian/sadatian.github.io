# Site Settings
title: Dan Sadatian | Data Science Manager
url: 'https://sadatian.io'
baseurl: ''

description: Data science leader with 10+ years of experience building and scaling machine learning systems in enterprise environments. Proven track record leading cross-functional teams, deploying production-grade AI/ML platforms, and translating complex data into measurable business outcomes across risk, fraud, and governance-heavy domains. Recently led enterprise data science integration strategy during the Capital One–Discover merger, aligning platforms, workflows, and model governance across organizations.

# Author (used by jekyll-seo-tag for structured data)
author:
  name: Dan Sadatian
  email: dan@sadatian.io
  linkedin: dansadatian
  github: sadatian

# Social (used by jekyll-seo-tag)
social:
  name: Dan Sadatian
  links:
    - https://www.linkedin.com/in/dansadatian
    - https://github.com/sadatian

# Theme: blue | turquoise | green | berry | orange | ceramic
theme_skin: ceramic
chrome_mobile_color: # use hex colors (e.g. #1976d2)

# Tracker
analytics: G-VL88Z2BS3R

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Plugins (all whitelisted by GitHub Pages)
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

# Build settings
compress-site: yes
encoding: "utf-8"
compress_html:
  clippings: all
  ignore:
    envs: development

# Files to exclude from the built site
exclude:
  - GEMINI.md
  - README.md
  - Gemfile
  - Gemfile.lock
  - docker-compose.yml
  - error.log
  - projects/sampleproject.html

# Sitemap exclusions: suppress raw notebook exports, PDFs, and assets
defaults:
  - scope:
      path: "projects/*.html"
    values:
      sitemap: false
  - scope:
      path: "projects/*.pdf"
    values:
      sitemap: false
  - scope:
      path: "assets"
    values:
      sitemap: false

# Development Settings
port: 4000
host: 0.0.0.0
safe: false
