#Update all the sections by editing the data.yml file inside _data folder.

# Site Settings
title: Dan Sadatian | Data Science Manager
url: 'https://sadatian.io/'

#change it according to your repository name
# disabling since we are using a custom domain
# baseurl: '/resume' 

description: Data science leader with 10+ years of experience building and scaling machine learning systems in enterprise environments. Proven track record leading cross-functional teams, deploying production-grade AI/ML platforms, and translating complex data into measurable business outcomes across risk, fraud, and governance-heavy domains. Recently led enterprise data science integration strategy during the Capital One–Discover merger, aligning platforms, workflows, and model governance across organizations.
# Style will be applied only after restarting the build or serve. Just choose one of the options.
theme_skin: ceramic # blue turquoise green berry orange ceramic
chrome_mobile_color: #use hex colors (ex:#1976d2) or leave empty if you don't want a color for chrome mobile searchbar

# Tracker
analytics:

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed # http://sass-lang.com/documentation/file.SASS_REFERENCE.html#output_style

# Build settings
compress-site: yes

encoding: "utf-8"
compress_html: # - http://jch.penibelst.de/
  clippings: all
  ignore:
    envs: development

# Development Settings
port: 4000
host: 0.0.0.0
safe: false
